<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Schibsted+Grotesk:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1400px;height:560px;overflow:hidden;font-family:"Schibsted Grotesk",system-ui,sans-serif}
  .wrap{width:1400px;height:560px;background:#c8bff5;padding:36px;display:flex;align-items:center;justify-content:center}
  .card{width:1328px;height:488px;background:#f6f3ec;
    background-image:linear-gradient(to right,rgba(120,100,80,.12) 1px,transparent 1px),
      linear-gradient(to bottom,rgba(120,100,80,.12) 1px,transparent 1px);
    background-size:24px 24px;border:2.5px solid #0a0a0a;box-shadow:8px 8px 0 #0a0a0a;
    display:flex;align-items:center;justify-content:space-between;padding:0 72px;position:relative}
  .left{max-width:720px}
  .logo{font-weight:900;font-size:18px;letter-spacing:.08em;margin-bottom:18px;display:flex;align-items:center;gap:10px}
  .logo i{width:14px;height:14px;border-radius:50%;background:#c1f04c;border:1.5px solid #0a0a0a;display:block}
  h1{font-family:"Instrument Serif",Georgia,serif;font-weight:400;font-size:84px;line-height:.9;letter-spacing:-.03em}
  h1 em{font-style:italic;color:#5b5bd6}
  p{margin-top:22px;font-size:22px;font-weight:600;color:#3a352e;max-width:560px;line-height:1.4}
  .pill{display:inline-flex;margin-top:28px;background:#c1f04c;border:2px solid #0a0a0a;border-radius:999px;
    padding:14px 28px;font-weight:900;font-size:16px;box-shadow:4px 4px 0 #0a0a0a}
  .badge{position:absolute;top:40px;right:56px;width:120px;height:120px;border-radius:50%;background:#c1f04c;
    border:2.5px solid #0a0a0a;box-shadow:4px 4px 0 #0a0a0a;display:grid;place-items:center;text-align:center;
    font-weight:900;font-size:14px;line-height:1.15;transform:rotate(10deg)}
</style></head>
<body>
<div class="wrap"><div class="card">
  <div class="badge">FREE<br>LOCAL</div>
  <div class="left">
    <div class="logo"><i></i> FULL SNAP</div>
    <h1>Capture. Redact.<br><em>Ship.</em></h1>
    <p>Screenshots safe enough for Slack — auto-hide secrets, mark steps, copy the pack.</p>
    <div class="pill">Chrome extension · no upload</div>
  </div>
</div></div>
</body></html>
